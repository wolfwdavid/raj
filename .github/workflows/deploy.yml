# .github/workflows/deploy.yml
# FIRST DEPLOY: enablement:true below often no-ops on a brand-new repo (Pages first-enable race).
# If the first green run 404s, set Settings -> Pages -> Source = "GitHub Actions" by hand,
# then re-run this workflow via the "Run workflow" button (workflow_dispatch).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                       # surface all four sites' status every run
      matrix:
        site: [vfamigos, lipool, lidentist, cannaworldnews]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.site }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.site }}
      - name: Type-check (svelte-check gate)              # D-09 / QUAL-02
        run: npm run check
        working-directory: ${{ matrix.site }}
      - name: Build without base (custom-domain readiness) # INFRA-04 — proves BASE_PATH='' builds
        run: npm run build
        working-directory: ${{ matrix.site }}
        env:
          BASE_PATH: ''
      - run: npm run build                                # deployed artifact (BASE_PATH set)
        working-directory: ${{ matrix.site }}
        env:
          BASE_PATH: /${{ github.event.repository.name }}/${{ matrix.site }}   # e.g. /raj/vfamigos
      - name: Portability guard — built HTML             # D-08 / INFRA-06
        working-directory: ${{ matrix.site }}
        run: |
          set -euo pipefail
          # Fail on root-absolute href/src (incl. any hardcoded /raj/... link or asset).
          # Allows ./ relative, // protocol-relative, https:// absolute, and the
          # base-derived hydration `assets:` JSON (not an href/src attribute).
          if grep -rnE '(href|src)="/[^/]' build --include="*.html"; then
            echo "::error::${{ matrix.site }}: root-absolute href/src (incl. hardcoded /raj/) in built HTML — use {base} from \$app/paths or relative paths"
            exit 1
          fi
          echo "portability guard passed for ${{ matrix.site }}"
      - name: Content + dynamic-route assertions (INFRA-05/07)   # built HTML has real content; dir/index.html per record == deep-linkable
        working-directory: ${{ matrix.site }}
        run: |
          set -euo pipefail
          # build/ holds the BASE_PATH (deployed) artifact at this point.
          # Per site: built dynamic-route file count == data record count (entries() completeness),
          # plus a real-content grep (no empty shell). One dir/index.html per record is the
          # structural proof that Pages deep-links + hard-refresh work (trailingSlash='always' + adapter-static).
          case "${{ matrix.site }}" in
            vfamigos)
              exp=$(grep -c 'slug:' src/lib/data/products.ts)
              act=$(ls build/products/*/index.html | wc -l)
              test "$exp" -eq "$act" || { echo "::error::vfamigos products: expected $exp pages, built $act (entries() gap)"; exit 1; }
              grep -rq "Add to collection" build/products/*/index.html || { echo "::error::vfamigos PDP missing add-to-collection button"; exit 1; }
              ;;
            lidentist)
              exp=$(grep -c 'slug:' src/lib/data/dentists.ts)
              act=$(ls build/dentists/*/index.html | wc -l)
              test "$exp" -eq "$act" || { echo "::error::lidentist dentists: expected $exp pages, built $act (entries() gap)"; exit 1; }
              grep -rq "Sample data for demonstration" build/index.html build/dentists/*/index.html || { echo "::error::lidentist missing FTC sample-data label in built HTML"; exit 1; }
              grep -rq "out of 5 stars," build/dentists/*/index.html || { echo "::error::lidentist detail missing aria rating"; exit 1; }
              ;;
            cannaworldnews)
              exp=$(ls src/content/articles/*.md | wc -l)
              act=$(ls build/articles/*/index.html | wc -l)
              test "$exp" -eq "$act" || { echo "::error::cannaworldnews articles: expected $exp pages, built $act (entries() gap)"; exit 1; }
              reg=$(ls build/region/*/index.html | wc -l)
              test "$reg" -eq 4 || { echo "::error::cannaworldnews regions: expected 4, built $reg"; exit 1; }
              grep -rq "<time datetime=" build/articles/*/index.html || { echo "::error::cannaworldnews article missing <time datetime>"; exit 1; }
              ;;
            lipool)
              test -f build/gallery/index.html || { echo "::error::lipool /gallery/ not prerendered"; exit 1; }
              grep -rq "HomeAndConstructionBusiness" build/index.html || { echo "::error::lipool missing JSON-LD in built HTML"; exit 1; }
              grep -rq "aggregateRating" build/index.html && { echo "::error::lipool must NOT emit aggregateRating (no visible reviews)"; exit 1; } || true
              ;;
          esac
          echo "content + dynamic-route assertions passed for ${{ matrix.site }}"
      - uses: actions/upload-artifact@v4       # plain artifact — NOT the Pages-specific uploader
        with:
          name: site-${{ matrix.site }}
          path: ${{ matrix.site }}/build
          if-no-files-found: error
          include-hidden-files: true

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4              # for pages-root/
      - uses: actions/download-artifact@v4     # nests each under _artifacts/site-<name>/
        with:
          path: _artifacts
          pattern: site-*
      - name: Assemble _site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp pages-root/index.html _site/index.html
          cp pages-root/404.html   _site/404.html
          cp pages-root/.nojekyll  _site/.nojekyll
          for site in vfamigos lipool lidentist cannaworldnews; do
            test -d "_artifacts/site-$site" || { echo "::error::missing artifact for $site"; exit 1; }
            mkdir -p "_site/$site"
            cp -r "_artifacts/site-$site/." "_site/$site/"
            test -f "_site/$site/index.html" || { echo "::error::missing index.html for $site"; exit 1; }
          done
          count=$(ls -1 _site/*/index.html | wc -l)
          test "$count" -eq 4 || { echo "::error::expected 4 site index.html, got $count"; exit 1; }
      - uses: actions/configure-pages@v5
        with:
          enablement: true                     # idempotent; may no-op on first run (see header)
      - uses: actions/upload-pages-artifact@v3 # the ONE Pages artifact
        with:
          path: _site

  deploy:
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
