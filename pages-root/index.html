<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>raj — four sites, one deploy</title>
		<style>
			:root { color-scheme: dark; }
			* { box-sizing: border-box; }
			body {
				margin: 0; min-height: 100vh; display: grid; place-items: center;
				background: #0e0e10; color: #e6e6e6;
				font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				padding: 2rem;
			}
			main { width: 100%; max-width: 42rem; }
			h1 { font-size: 3rem; letter-spacing: -0.03em; margin: 0 0 0.25rem; }
			.tagline { color: #9a9a9f; margin: 0 0 2rem; }
			ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.75rem; }
			a.card {
				display: flex; flex-direction: column; gap: 0.15rem;
				padding: 1rem 1.25rem; border: 1px solid #26262b; border-radius: 12px;
				background: #16161a; color: inherit; text-decoration: none;
				transition: border-color 0.15s ease, background 0.15s ease;
			}
			a.card:hover, a.card:focus-visible { border-color: #4c8bf5; background: #1b1b21; }
			a.card:focus-visible { outline: 2px solid #4c8bf5; outline-offset: 2px; }
			.name { font-weight: 600; font-size: 1.1rem; }
			.desc { color: #9a9a9f; font-size: 0.9rem; }
		</style>
	</head>
	<body>
		<main>
			<h1>raj</h1>
			<p class="tagline">Four sites shipping from one repo.</p>
			<ul>
				<li><a class="card" href="./vfamigos/"><span class="name">vfamigos</span><span class="desc">collectibles — coming soon</span></a></li>
				<li><a class="card" href="./lipool/"><span class="name">lipool</span><span class="desc">Long Island pools — coming soon</span></a></li>
				<li><a class="card" href="./lidentist/"><span class="name">lidentist</span><span class="desc">dentist reviews — coming soon</span></a></li>
				<li><a class="card" href="./cannaworldnews/"><span class="name">cannaworldnews</span><span class="desc">cannabis news — coming soon</span></a></li>
			</ul>
		</main>
	</body>
</html>
